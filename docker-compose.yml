services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      # Set INGEST_BASE_URL to your local dev URL (e.g. http://tokentracker.test)
      INGEST_BASE_URL: "${INGEST_BASE_URL:-http://localhost:3046}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes: {}
